<nz-content  class="bg-gray-600">
<div class="pt-5 pl-5 pb-5 h-max">
  <ul class="flex flex-wrap justify-evenly">
    <ng-container *ngFor="let index of array">
      <li class="w-52 h-60">
        <nz-card nzHoverable [nzCover]="coverTemplate">
          <nz-card-meta
            nzTitle="Europe Street beat"
            nzDescription="www.instagram.com"
          ></nz-card-meta>
        </nz-card>
        <ng-template #coverTemplate>
          <div class="w-full h-32">
            <img
              class="w-full h-full object-cover"
              alt="example"
              src="{{ index }}"
            />
          </div>
        </ng-template>
      </li>
    </ng-container>
  </ul>
</div>
</nz-content>
