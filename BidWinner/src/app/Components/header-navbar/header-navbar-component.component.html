<nz-header>
  <div
    class="w-32 h-8 float-left bg-special mt-4 mr-6 mb-4 ml-0 cursor-pointer"
  >
    <img
      routerLink="/"
      class="object-cover w-full h-full"
      src="/assets/Logo.png"
      alt=""
    />
  </div>
  <ul nz-menu nzTheme="dark" nzMode="horizontal" class="bg-topbar">
    <a nz-menu-item>Auctions</a>
    <a nz-menu-item>About Us</a>
    <a class="float-right" nz-menu-item nz-dropdown nzTrigger="click" [nzDropdownMenu]="menu">
      <span nz-icon nzType="user" nzTheme="outline"></span
    ></a>
    <nz-dropdown-menu #menu="nzDropdownMenu">
      <ul nz-menu>
        <a nz-menu-item routerLink="/register" >Register</a>
        <a nz-menu-item routerLink="/login">Login</a>
      </ul>
    </nz-dropdown-menu>
  </ul>
</nz-header>
